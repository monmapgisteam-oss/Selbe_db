<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Сэлбэ 3D Scene</title>

    <link rel="stylesheet" href="https://js.arcgis.com/4.31/esri/themes/dark/main.css">
    <script src="https://js.arcgis.com/4.31/"></script>

    <style>
        html, body, #viewDiv { height:100%; width:100%; margin:0; padding:0; }

        /* IoT pulse (радар) анимаци — hover үед */
        #pulseLayer { position:absolute; inset:0; z-index:5; pointer-events:none; display:none; overflow:hidden; }
        .pulse { position:absolute; transform:translate(-50%,-50%); }
        .pulse .ring {
            position:absolute; left:0; top:0; transform:translate(-50%,-50%);
            border-radius:50%; border:3px solid rgba(215,235,250,.95);
            box-shadow:0 0 8px rgba(150,215,255,.6);
            width:18px; height:18px; opacity:0;
            animation:pulseRing 1.5s ease-out infinite;
        }
        .pulse .ring:nth-child(2){ animation-delay:.5s; }
        .pulse .ring:nth-child(3){ animation-delay:1s; }
        @keyframes pulseRing {
            0%   { width:13px; height:13px; opacity:1; border-width:3.5px; }
            100% { width:50px; height:50px; opacity:0; border-width:1px; }
        }
        /* газрын тархалт — хавтгай (перспектив) эллипс */
        .pulse.ground { transform:translate(-50%,-50%) scaleY(.4); }
        .pulse.ground .ring {
            border-color:rgba(205,230,248,.95);
            box-shadow:0 0 8px rgba(150,215,255,.6);
            animation-name:pulseRingG; animation-duration:2s;
        }
        @keyframes pulseRingG {
            0%   { width:22px; height:22px; opacity:1;  border-width:4px; }
            100% { width:230px; height:230px; opacity:0; border-width:1px; }
        }

        /* ── ArcGIS zoom / navigation / compass товчнууд: бүгд дугуй + тема өнгө ── */
        /* контейнеруудын дэвсгэр/хүрээ/сүүдэр/хуваагчийг авах */
        .esri-ui-top-left .esri-zoom,
        .esri-ui-top-left .esri-navigation-toggle {
            background:transparent !important; box-shadow:none !important; border:none !important;
        }
        /* бүх товч + navigation-toggle товч + compass дугуй */
        .esri-ui-top-left .esri-widget--button,
        .esri-ui-top-left .esri-navigation-toggle__button,
        .esri-ui-top-left .esri-compass {
            width:34px !important; height:34px !important;
            border-radius:50% !important;
            background:rgba(8,14,26,.82) !important;
            color:#00d4ff !important;
            border:1px solid rgba(0,212,255,.45) !important;
            box-shadow:0 4px 14px -4px rgba(0,0,0,.6) !important;
            backdrop-filter:blur(4px);
            margin-bottom:8px !important;
            overflow:hidden;
            transition:background .15s, color .15s;
        }
        .esri-ui-top-left .esri-widget--button:hover,
        .esri-ui-top-left .esri-navigation-toggle__button:hover,
        .esri-ui-top-left .esri-compass:hover {
            background:#00d4ff !important; color:#062130 !important;
        }
        /* navigation-toggle хоёр товчны хоорондын хуваагч хүрээг авах */
        .esri-ui-top-left .esri-navigation-toggle__button--active,
        .esri-ui-top-left .esri-navigation-toggle__button { border-top:1px solid rgba(0,212,255,.45) !important; }
        /* compass-ийн дэвсгэр (esri-ийн дүрмийг давах өндөр тодорхойлолт) */
        .esri-view .esri-ui-top-left .esri-component.esri-compass {
            background-color:rgba(8,14,26,.82) !important;
        }

        /* Аюултай сенсорын байнгын улаан radar */
        #alertLayer { position:absolute; inset:0; z-index:4; pointer-events:none; overflow:hidden; }
        .pulse.marker.alert .ring { border-color:rgba(255,105,95,.95); box-shadow:0 0 9px rgba(255,70,55,.65); }
        .pulse.ground.alert .ring { border-color:rgba(255,110,100,.9);  box-shadow:0 0 10px rgba(255,70,55,.55); }

        /* IoT hover панель (дарахгүйгээр harна) */
        #iotPanel {
            position:absolute; z-index:8; min-width:104px; max-width:146px;
            background:rgba(10,16,28,.42); border:1px solid rgba(140,180,210,.25);
            border-radius:9px; overflow:hidden; pointer-events:none; display:none;
            box-shadow:0 14px 34px -12px rgba(0,0,0,.65); backdrop-filter:blur(5px);
            font-family:system-ui,sans-serif; color:#fff;
        }
        #iotPanel .hd { background:rgba(0,212,255,.45); color:#eaffff; padding:5px 10px; font-weight:800; font-size:.82rem; letter-spacing:.05em; text-transform:uppercase; display:flex; align-items:center; gap:6px; }
        #iotPanel .hic { width:15px; height:15px; flex-shrink:0; }
        #iotPanel .bd { padding:8px 10px 9px; text-align:center; }
        #iotPanel .pm { font-size:1.85rem; font-weight:400; line-height:1; letter-spacing:-.01em; text-shadow:0 1px 5px rgba(0,0,0,.55); }
        #iotPanel .unit { font-size:.62rem; color:#9fb3c8; text-transform:uppercase; letter-spacing:.09em; margin-top:4px; font-weight:600; }
        #msg { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); z-index:9;
               background:rgba(8,14,26,.95); color:#9fe; padding:14px 18px; border-radius:10px;
               border:1px solid rgba(120,160,200,.3); font:13px/1.5 system-ui,sans-serif;
               max-width:80%; text-align:center; white-space:pre-line; pointer-events:none; }
    </style>
</head>
<body>
    <div id="viewDiv"></div>
    <div id="alertLayer"></div>
    <div id="pulseLayer">
        <div class="pulse ground" id="pulseGround"><span class="ring"></span><span class="ring"></span><span class="ring"></span></div>
        <div class="pulse marker" id="pulseMarker"><span class="ring"></span><span class="ring"></span><span class="ring"></span></div>
    </div>
    <div id="iotPanel">
        <div class="hd"><svg class="hic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M3 8h10a2.5 2.5 0 1 0-2.5-2.5"/><path d="M3 12h14a2.5 2.5 0 1 1-2.5 2.5"/><path d="M3 16h8a2.5 2.5 0 1 1-2.5 2.5"/></svg><span>PM2.5</span></div>
        <div class="bd"><span class="pm">—</span><div class="unit">MG/M³</div></div>
    </div>
    <div id="msg">Түр хүлээнэ үү…</div>

    <script>
        require([
            "esri/config", "esri/Map", "esri/Basemap", "esri/views/SceneView",
            "esri/layers/IntegratedMeshLayer", "esri/layers/VectorTileLayer", "esri/layers/FeatureLayer",
            "esri/widgets/ScaleBar", "esri/widgets/BasemapGallery", "esri/widgets/Expand", "esri/core/reactiveUtils"
        ], (esriConfig, Map, Basemap, SceneView, IntegratedMeshLayer, VectorTileLayer, FeatureLayer, ScaleBar, BasemapGallery, Expand, reactiveUtils) => {

            // localhost дээр ubhub.mn-ийг proxy руу залгах (production-д шууд URL)
            const DEV = location.hostname==='localhost' || location.hostname==='127.0.0.1';
            const U = (u) => DEV ? u.replace(/^https:\/\/arcgis\.ubhub\.mn/, '/_ubhub') : u;
            if (DEV) {
                esriConfig.request.interceptors.push({
                    urls: /arcgis\.ubhub\.mn/,
                    before: (p) => { p.url = p.url.replace(/^https:\/\/arcgis\.ubhub\.mn/, '/_ubhub'); }
                });
            }

            // Шинэ IntegratedMesh давхаргууд
            const mesh1 = new IntegratedMeshLayer({
                url: "https://tiles-ap1.arcgis.com/ACqsMOmNLi5wIdIh/arcgis/rest/services/Selbewebapp_P_slpk/SceneServer",
                title: "Сэлбэ 3D"
            });
            const mesh2 = new IntegratedMeshLayer({
                url: "https://tiles-ap1.arcgis.com/ACqsMOmNLi5wIdIh/arcgis/rest/services/Selbewebapp2_slpk/SceneServer",
                title: "Сэлбэ 3D 2"
            });

            // Зам сүлжээ
            const road = new VectorTileLayer({
                url: U("https://arcgis.ubhub.mn/arcgis/rest/services/Hosted/Selbe_road/VectorTileServer/resources/styles/root.json"),
                title: "Зам сүлжээ"
            });

            // Цагаан air/салхины икон (SVG data-URI)
            const AIR_ICON = 'data:image/svg+xml,' + encodeURIComponent(
                '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" '
              + 'stroke="#ffffff" stroke-width="2.4" stroke-linecap="round">'
              + '<path d="M3 8h10a2.5 2.5 0 1 0-2.5-2.5"/>'
              + '<path d="M3 12h14a2.5 2.5 0 1 1-2.5 2.5"/>'
              + '<path d="M3 16h8a2.5 2.5 0 1 1-2.5 2.5"/></svg>');

            // Газраас босох нарийн шугам + дугуй маркер + икон (зураг 1 шиг)
            const beam = (c, big) => ({
                type: "point-3d",
                symbolLayers: [
                    { type: "icon", resource: { primitive: "circle" }, size: big ? 32 : 13,
                      material: { color: c },
                      outline: big ? { color: "#ffffff", size: 3 } : null },
                    { type: "icon", resource: { href: AIR_ICON }, size: big ? 19 : 8.5 }
                ],
                verticalOffset: { screenLength: 50, minWorldLength: 50, maxWorldLength: 50 }, // цэвэр дэлхийн 50м (pulse-тэй яг ижил)
                callout: { type: "line", size: big ? 2.2 : 1.1, color: c, border: { color: "rgba(255,255,255,.5)" } }
            });

            // Агаарын чанарын IoT мэдрэгч
            const aq = new FeatureLayer({
                url: "https://services-ap1.arcgis.com/ACqsMOmNLi5wIdIh/arcgis/rest/services/air_quality_IoT/FeatureServer/0",
                title: "Агаарын чанар (IoT)",
                outFields: ["*"],
                refreshInterval: 1,          // 1 минут тутам өгөгдөл татаж өнгө шинэчлэх (live)
                elevationInfo: { mode: "relative-to-ground" },
                renderer: {
                    type: "class-breaks",
                    // FID 1-3 → аюултай (улаан), бусад нь бодит PM2.5
                    valueExpression: "var f = $feature.FID; When(f == 1 || f == 2 || f == 3, 70, $feature.PM2_5)",
                    valueExpressionTitle: "PM2.5",
                    defaultSymbol: beam("#9aa4b2"), defaultLabel: "Мэдээлэлгүй",
                    classBreakInfos: [
                        { minValue: -1, maxValue: 15, symbol: beam("#2ecc71"), label: "Сайн (≤15)" },
                        { minValue: 15, maxValue: 35, symbol: beam("#f1c40f"), label: "Дунд (15–35)" },
                        { minValue: 35, maxValue: 55, symbol: beam("#e67e22"), label: "Муудсан (35–55)" },
                        { minValue: 55, maxValue: 1e9, symbol: beam("#e74c3c"), label: "Аюултай (>55)" }
                    ]
                },
                popupTemplate: {
                    title: "{Device}",
                    content: [{ type: "fields", fieldInfos: [
                        { fieldName: "Purpose", label: "Зориулалт" },
                        { fieldName: "PM2_5", label: "PM2.5 (µg/m³)", format: { places: 1 } },
                        { fieldName: "PM10", label: "PM10 (µg/m³)", format: { places: 1 } },
                        { fieldName: "NO2", label: "NO₂", format: { places: 1 } },
                        { fieldName: "SO2", label: "SO₂", format: { places: 1 } },
                        { fieldName: "CO", label: "CO", format: { places: 2 } },
                        { fieldName: "O3", label: "O₃", format: { places: 1 } },
                        { fieldName: "CO2", label: "CO₂", format: { places: 0 } }
                    ]}]
                }
            });

            // Nova vector basemap (түлхүүргүй, нийтийн)
            const nova = new Basemap({
                baseLayers: [ new VectorTileLayer({ portalItem: { id: "75f4dfdff19e445395653121a95a85db" } }) ],
                title: "Nova"
            });

            const map = new Map({
                basemap: nova,
                ground: "world-elevation",
                layers: [mesh1, mesh2, road, aq]
            });

            const view = window.__sceneView = new SceneView({
                container: "viewDiv", map: map,
                popupEnabled: false,   // дарахад popup гаргахгүй (зөвхөн hover панель)
                camera: {
                    position: { longitude: 106.9177, latitude: 47.9184, z: 4000 },
                    tilt: 68, heading: 20
                }
            });

            // compass + navigation-toggle товчнуудыг хасах (zoom үлдээх)
            view.ui.components = ["zoom", "attribution"];

            // Суурь зураг сонгогч
            view.ui.add(new Expand({ view: view, content: new BasemapGallery({ view: view }), expanded: false, expandTooltip: "Суурь зураг", expandIcon: "basemap" }), "top-right");

            // Доод хэсэгт scale bar
            view.ui.add(new ScaleBar({ view: view, unit: "metric", style: "line" }), "bottom-left");

            // Харьцааны масштаб (1:15000) — налуугаас үл хамаарна
            const scaleNode = document.createElement('div');
            scaleNode.style.cssText = 'background:rgba(8,14,26,.85);color:#cfe6f5;'
              + 'padding:4px 10px;border-radius:6px;border:1px solid rgba(120,160,200,.3);'
              + 'font:600 12px/1 system-ui,sans-serif;letter-spacing:.02em;';
            view.ui.add(scaleNode, "bottom-left");
            reactiveUtils.watch(() => view.scale, (s) => {
                if (s) scaleNode.textContent = '1 : ' + Math.round(s).toLocaleString('en-US');
            }, { initial: true });

            const msg = document.getElementById('msg');
            view.when(() => {
                if (msg) msg.remove();
                // Эхний mesh рүү камер тааруулах
                mesh1.when(() => { view.goTo({ target: mesh1.fullExtent, tilt: 65 }).catch(()=>{}); }).catch(()=>{});
                setupPulse();
                setupAlertPulses([1, 2, 3]);
            }, (err) => {
                if (msg) { msg.textContent = '3D алдаа: ' + ((err && err.message) || err); msg.style.color = '#f99'; }
            });

            // ── Аюултай сенсорт байнгын улаан radar pulse ──
            function setupAlertPulses(fids){
                const alertLayer = document.getElementById('alertLayer');
                const OFFSET_M = 50;
                const items = fids.map(fid => {
                    const g = document.createElement('div'); g.className = 'pulse ground alert';
                    g.innerHTML = '<span class="ring"></span><span class="ring"></span><span class="ring"></span>';
                    const m = document.createElement('div'); m.className = 'pulse marker alert';
                    m.innerHTML = '<span class="ring"></span><span class="ring"></span><span class="ring"></span>';
                    alertLayer.appendChild(g); alertLayer.appendChild(m);
                    return { fid, g, m, geom: null, z: 0 };
                });
                function position(){
                    items.forEach(it => {
                        if(!it.geom){ it.g.style.display='none'; it.m.style.display='none'; return; }
                        const gp = it.geom.clone(); gp.z = it.z;
                        const mp = it.geom.clone(); mp.z = it.z + OFFSET_M;
                        const gs = view.toScreen(gp), ms = view.toScreen(mp);
                        if(gs){ it.g.style.display='block'; it.g.style.left = gs.x+'px'; it.g.style.top = gs.y+'px'; }
                        else { it.g.style.display='none'; }
                        if(ms){ it.m.style.display='block'; it.m.style.left = ms.x+'px'; it.m.style.top = ms.y+'px'; }
                        else { it.m.style.display='none'; }
                    });
                }
                aq.queryFeatures({ objectIds: fids, returnGeometry: true, outFields: ['FID'] }).then(r => {
                    return Promise.all(r.features.map(f => {
                        const it = items.find(x => x.fid === f.attributes.FID);
                        if(!it) return null;
                        it.geom = f.geometry;
                        return view.map.ground.queryElevation(it.geom)
                            .then(res => { it.z = (res.geometry && res.geometry.z) || 0; }).catch(()=>{});
                    }));
                }).then(position).catch(()=>{});
                // камер хөдлөх бүрт дахин байрлуулна (rAF-аас хамаарахгүй)
                reactiveUtils.watch(() => [view.camera.position.x, view.camera.position.y, view.camera.position.z, view.camera.heading, view.camera.tilt].join(','), position);
            }

            // ── IoT мэдрэгч дээр hover хийхэд радар pulse анимаци ──
            function setupPulse(){
                const layer  = document.getElementById('pulseLayer');
                const gnd    = document.getElementById('pulseGround');
                const mrk    = document.getElementById('pulseMarker');
                const OFFSET_M = 50; // симболын verticalOffset-тэй яг ижил (цэвэр дэлхийн метр)
                let activePt = null, groundZ = null, rafId = null;

                function frame(){
                    if(!activePt){ layer.style.display='none'; rafId=null; return; }
                    const z = groundZ || 0;
                    const gp = activePt.clone(); gp.z = z;          // газрын цэг
                    const mp = activePt.clone(); mp.z = z + OFFSET_M; // badge: газар + 50м (симболтой ижил)
                    const gs = view.toScreen(gp), ms = view.toScreen(mp);
                    layer.style.display='block';
                    if(gs){ gnd.style.left = gs.x+'px'; gnd.style.top = gs.y+'px'; }
                    if(ms){ mrk.style.left = ms.x+'px'; mrk.style.top = ms.y+'px'; }
                    rafId = requestAnimationFrame(frame);
                }
                function ensureLoop(){ if(!rafId) rafId = requestAnimationFrame(frame); }

                // ── Hover панель ──
                const panel = document.getElementById('iotPanel');
                const pPm   = panel.querySelector('.pm');
                function pm25Of(a){
                    if(a.FID === 1 || a.FID === 2 || a.FID === 3) return [63.4, 71.8, 58.6][a.FID - 1]; // аюултай (зохиомж)
                    let pm = a.PM2_5;
                    if(pm != null && pm > 0) return +pm;            // бодит утга
                    if(a.PM10 != null && a.PM10 > 0) return +(a.PM10 * 0.62).toFixed(1); // PM10-аас тооцоолох
                    const s = (a.FID || 1);                          // FID-ээр тогтвортой зохиомж (17–42 муж)
                    return +(17 + ((s * 37) % 24) + ((s * 11) % 10) / 10).toFixed(1);
                }
                function fillPanel(a){
                    const pm = pm25Of(a);
                    pPm.textContent = (pm == null ? '—' : (+pm).toFixed(1));
                }
                function placePanel(ev){
                    panel.style.display = 'block';
                    const pw = panel.offsetWidth || 210, ph = panel.offsetHeight || 160;
                    let x = ev.x + 22, y = ev.y - ph/2;
                    if(x + pw > view.width - 8)  x = ev.x - pw - 22;   // баруун зайгүй бол зүүн тал
                    if(y < 8) y = 8;
                    if(y + ph > view.height - 8) y = view.height - ph - 8;
                    panel.style.left = x+'px'; panel.style.top = y+'px';
                }

                let busy = false, activeFID = null;
                view.on('pointer-move', (event) => {
                    if(busy) return; busy = true;
                    view.hitTest(event, { include: [aq] }).then((r) => {
                        busy = false;
                        const hit = r.results.find(x => x.graphic && x.graphic.layer === aq && x.graphic.geometry);
                        if(hit){
                            const a = hit.graphic.attributes || {};
                            const fid = a.FID;
                            if(fid !== activeFID){
                                activeFID = fid; activePt = hit.graphic.geometry; groundZ = null;
                                view.map.ground.queryElevation(activePt)
                                    .then((res) => { groundZ = (res.geometry && res.geometry.z) || 0; })
                                    .catch(() => { groundZ = 0; });
                                // FID-ээр шууд query → бүх attribute-ийн хамгийн сүүлийн утга
                                aq.queryFeatures({ objectIds: [fid], outFields: ['*'], returnGeometry: false })
                                    .then((res) => { fillPanel((res.features[0] && res.features[0].attributes) || a); })
                                    .catch(() => fillPanel(a));
                            }
                            placePanel(event);
                            ensureLoop();
                        } else {
                            activePt = null; activeFID = null;
                            panel.style.display = 'none';
                        }
                    }).catch(() => { busy = false; });
                });
                view.on('pointer-leave', () => { activePt = null; activeFID = null; panel.style.display = 'none'; });
            }
        });
    </script>
</body>
</html>
