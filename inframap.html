<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="utf-8">
    <title>Дэд бүтэц — газрын зураг</title>
    <link rel="stylesheet" href="https://js.arcgis.com/4.31/esri/themes/dark/main.css">
    <script src="https://js.arcgis.com/4.31/"></script>
    <style>
        html,body,#viewDiv{ height:100%;width:100%;margin:0;padding:0 }
        #viewDiv{ position:absolute;inset:0 }
        #msg{ position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:9;
              background:rgba(8,14,26,.95);color:#9fe;padding:12px 16px;border-radius:10px;
              border:1px solid rgba(120,160,200,.3);font:13px/1.4 system-ui,sans-serif;pointer-events:none }
        /* Давхаргын хяналт */
        #legend{ position:absolute;top:12px;left:12px;z-index:10;background:rgba(9,14,22,.9);
                 border:1px solid rgba(120,160,205,.16);border-radius:11px;padding:10px 12px;
                 font:12px/1.3 system-ui,sans-serif;color:#cfe;backdrop-filter:blur(10px);min-width:150px }
        #legend .lg-t{ font-weight:800;font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;color:#7fdfff;margin-bottom:8px }
        .lg-row{ display:flex;align-items:center;gap:8px;padding:3px 0;cursor:pointer;user-select:none;opacity:.95 }
        .lg-row:hover{ opacity:1 }
        .lg-row.off{ opacity:.4 }
        .lg-sw{ width:14px;height:11px;border-radius:3px;flex-shrink:0;border:1px solid rgba(255,255,255,.25) }
        .lg-ln{ width:15px;height:0;border-top-width:3px;border-top-style:solid;flex-shrink:0 }
        #hintClr{ margin-top:8px;font-size:.66rem;color:#8fb;cursor:pointer;display:none }
        #hintClr.show{ display:block }
    </style>
</head>
<body>
    <div id="viewDiv"></div>
    <div id="msg">Түр хүлээнэ үү…</div>
    <div id="legend" aria-label="Давхаргын хяналт">
        <div class="lg-t">Давхаргууд</div>
        <div class="lg-row" data-lyr="parcel"><span class="lg-sw" style="background:rgba(0,212,255,.5);border-color:#00d4ff"></span>Нэгж талбар</div>
        <div class="lg-row" data-lyr="bagts"><span class="lg-sw" style="background:transparent;border:2px solid #f5c842"></span>Багц хил</div>
        <div class="lg-row" data-lyr="bld"><span class="lg-sw" style="background:rgba(230,238,247,.6)"></span>Барилга</div>
        <div class="lg-row" data-lyr="r1"><span class="lg-ln" style="border-top-color:#f5c842"></span>Гадна дулаан</div>
        <div class="lg-row" data-lyr="r0"><span class="lg-ln" style="border-top-color:#00d4ff"></span>Ариутгах татуурга</div>
        <div class="lg-row" data-lyr="r2"><span class="lg-ln" style="border-top-color:#30f0a0"></span>Борооны ус</div>
        <div id="hintClr">✕ Шүүлтийг цэвэрлэх</div>
    </div>

    <script>
    require([
        "esri/Map","esri/Basemap","esri/views/MapView",
        "esri/layers/FeatureLayer","esri/layers/VectorTileLayer",
        "esri/widgets/BasemapGallery","esri/widgets/Expand"
    ], function(Map, Basemap, MapView, FeatureLayer, VectorTileLayer, BasemapGallery, Expand){
        var ORIGIN = location.origin;
        var B = "https://services.arcgis.com/HJzgwvlNIXssnQar/arcgis/rest/services";

        function fill(c, oc, w){ return { type:"simple-fill", color:c, outline:{ color:oc, width:w||0.8 } }; }
        function line(c, w){ return { type:"simple-line", color:c, width:w||1.4 }; }

        // ── Давхаргууд (styled) ──
        // Road surface (context, доод талд)
        var lyrRoadPlan = new FeatureLayer({ url:B+"/Road_shugam_suljee/FeatureServer/3", title:"Замын гадаргуу", legendEnabled:false, popupEnabled:false,
            renderer:{ type:"simple", symbol:fill([120,130,145,0.13],[150,160,175,0.3],0.5) } });

        // Нэгж талбар — эрхийн төрлөөр
        var parcelR = { type:"unique-value", field:"rigth_type",
            defaultSymbol: fill([120,140,165,0.16],[140,155,180,0.55]), defaultLabel:"Тодорхойгүй",
            uniqueValueInfos:[
                { value:"өмчлөх",  symbol: fill([0,212,255,0.26],[0,212,255,0.95]),  label:"Өмчлөх" },
                { value:"Эзэмших", symbol: fill([48,240,160,0.26],[48,240,160,0.95]), label:"Эзэмших" }
            ] };
        var lyrParcel = new FeatureLayer({ url:B+"/20260226_uldsen_negj_talbar_selbe/FeatureServer/35",
            title:"Нэгж талбар", outFields:["*"], renderer:parcelR, opacity:0.95, popupEnabled:false });

        // Багц хил — зөвхөн контур, багц тус бүр өнгөтэй
        var bagtsCols = { "Багц 1":[245,200,66], "Багц 2":[255,92,135], "Багц 3.1":[167,139,250], "Багц 4.1":[34,211,255], "Багц 4.2":[48,240,160] };
        var bagtsInfos = Object.keys(bagtsCols).map(function(k){ return { value:k, symbol: fill([0,0,0,0], bagtsCols[k].concat(1), 2.6), label:k }; });
        var lyrBagts = new FeatureLayer({ url:B+"/bagts_hil/FeatureServer/34", title:"Багц хил", outFields:["*"], popupEnabled:false,
            renderer:{ type:"unique-value", field:"BAGTS", defaultSymbol:fill([0,0,0,0],[200,210,225,0.7],1.4), defaultLabel:"Бусад", uniqueValueInfos:bagtsInfos } });

        // Барилгын хээ (текстгүй)
        var lyrBld = new FeatureLayer({ url:B+"/barilga_20260709/FeatureServer/0", title:"Барилга", popupEnabled:false,
            definitionExpression:"Layer NOT LIKE '%TEXT%'",
            renderer:{ type:"simple", symbol:fill([230,238,247,0.55],[255,255,255,0.7],0.6) } });

        // Инженерийн шугам сүлжээ (шугам)
        var lyrR0 = new FeatureLayer({ url:B+"/Road_shugam_suljee/FeatureServer/0", title:"Ариутгах татуурга", popupEnabled:false, renderer:{ type:"simple", symbol:line([0,212,255,0.9],1.3) } });
        var lyrR1 = new FeatureLayer({ url:B+"/Road_shugam_suljee/FeatureServer/1", title:"Гадна дулаан",       popupEnabled:false, renderer:{ type:"simple", symbol:line([245,200,66,0.9],1.3) } });
        var lyrR2 = new FeatureLayer({ url:B+"/Road_shugam_suljee/FeatureServer/2", title:"Борооны ус",         popupEnabled:false, renderer:{ type:"simple", symbol:line([48,240,160,0.95],1.6) } });

        var LYR = { parcel:lyrParcel, bagts:lyrBagts, bld:lyrBld, r0:lyrR0, r1:lyrR1, r2:lyrR2 };

        var nova = new Basemap({ baseLayers:[ new VectorTileLayer({ portalItem:{ id:"75f4dfdff19e445395653121a95a85db" } }) ], title:"Nova" });
        var map = new Map({ basemap:nova, layers:[ lyrRoadPlan, lyrParcel, lyrBagts, lyrBld, lyrR0, lyrR1, lyrR2 ] });
        var view = new MapView({ container:"viewDiv", map:map, center:[106.9177,47.9184], zoom:15, popupEnabled:false, constraints:{ rotationEnabled:false } });

        view.when(function(){
            var m=document.getElementById('msg'); if(m) m.remove();
            lyrParcel.when(function(){ view.goTo(lyrParcel.fullExtent).catch(function(){}); }).catch(function(){});
            view.ui.add(new Expand({ view:view, content:new BasemapGallery({ view:view }), expanded:false, expandTooltip:"Суурь зураг", expandIcon:"basemap" }), "top-right");
        }, function(err){ var m=document.getElementById('msg'); if(m){ m.textContent='Алдаа: '+((err&&err.message)||err); m.style.color='#f99'; } });

        // ── Давхаргын харагдац toggle (легенд дээр дарж) ──
        Array.prototype.forEach.call(document.querySelectorAll('.lg-row'), function(row){
            row.addEventListener('click', function(){
                var k=row.dataset.lyr, l=LYR[k]; if(!l) return;
                l.visible=!l.visible; row.classList.toggle('off', !l.visible);
            });
        });

        // ── Шүүлт / тодруулга (parent-аас) ──
        var clr=document.getElementById('hintClr');
        function clearFx(){
            [lyrParcel,lyrBagts].forEach(function(l){ l.featureEffect=null; });
            [lyrR0,lyrR1,lyrR2].forEach(function(l){ l.opacity=1; });
            lyrBld.opacity=1;
            clr.classList.remove('show');
            view.goTo(lyrParcel.fullExtent).catch(function(){});
        }
        clr.addEventListener('click', function(){ clearFx(); parent.postMessage({ type:'infraCleared' }, ORIGIN); });

        var DIM = "opacity(0.12) grayscale(0.7)";
        function zoomTo(layer, where){
            var q=layer.createQuery(); q.where=where;
            layer.queryExtent(q).then(function(r){ if(r&&r.extent) view.goTo(r.extent.expand(1.4)).catch(function(){}); }).catch(function(){});
        }
        function rightWhere(label){
            if(label==='Өмчлөх') return "rigth_type='өмчлөх'";
            if(label==='Эзэмших') return "rigth_type='Эзэмших'";
            return "rigth_type IS NULL OR (rigth_type<>'өмчлөх' AND rigth_type<>'Эзэмших')";
        }

        window.addEventListener('message', function(e){
            if(e.origin!==ORIGIN) return;
            var d=e.data||{};
            if(d.type!=='infraFilter') return;
            if(d.kind==='clear'){ clearFx(); return; }
            clr.classList.add('show');
            if(d.kind==='bagts'){
                [lyrR0,lyrR1,lyrR2].forEach(function(l){ l.opacity=0.25; }); lyrBld.opacity=0.4;
                lyrParcel.featureEffect=null;
                lyrBagts.featureEffect={ filter:{ where:"BAGTS='"+String(d.value).replace(/'/g,"''")+"'" }, excludedEffect:DIM };
                zoomTo(lyrBagts, "BAGTS='"+String(d.value).replace(/'/g,"''")+"'");
            } else if(d.kind==='right'){
                var w=rightWhere(d.value);
                lyrBagts.featureEffect=null;
                lyrParcel.featureEffect={ filter:{ where:w }, excludedEffect:DIM };
                zoomTo(lyrParcel, w);
            } else if(d.kind==='road'){
                var keep={ '0':lyrR0, '1':lyrR1, '2':lyrR2 };
                [lyrR0,lyrR1,lyrR2].forEach(function(l){ l.opacity=0.12; });
                if(keep[String(d.value)]) keep[String(d.value)].opacity=1;
                lyrParcel.featureEffect={ filter:{ where:"1=0" }, excludedEffect:"opacity(0.35)" };
                lyrBagts.featureEffect=null; lyrBld.opacity=0.5;
            }
        });

        // ── Газрын зураг дээр дарахад parent руу мэдэгдэх ──
        var busy=false;
        view.on('click', function(ev){
            if(busy) return; busy=true;
            view.hitTest(ev, { include:[lyrBagts,lyrParcel,lyrR0,lyrR1,lyrR2] }).then(function(r){
                busy=false;
                var g=(r.results||[]).map(function(x){return x.graphic;}).filter(function(x){return x&&x.layer;})[0];
                if(!g) return;
                var a=g.attributes||{};
                if(g.layer===lyrBagts) parent.postMessage({ type:'infraSelect', kind:'bagts', label:a.BAGTS }, ORIGIN);
                else if(g.layer===lyrParcel){
                    var rt=(a.rigth_type||'').trim();
                    parent.postMessage({ type:'infraSelect', kind:'right', label: rt==='өмчлөх'?'Өмчлөх':(rt==='Эзэмших'?'Эзэмших':'Тодорхойгүй') }, ORIGIN);
                }
                else if(g.layer===lyrR0) parent.postMessage({ type:'infraSelect', kind:'road', label:'0' }, ORIGIN);
                else if(g.layer===lyrR1) parent.postMessage({ type:'infraSelect', kind:'road', label:'1' }, ORIGIN);
                else if(g.layer===lyrR2) parent.postMessage({ type:'infraSelect', kind:'road', label:'2' }, ORIGIN);
            }).catch(function(){ busy=false; });
        });
        view.on('pointer-move', function(ev){
            view.hitTest(ev, { include:[lyrBagts,lyrParcel,lyrR0,lyrR1,lyrR2] }).then(function(r){
                view.container.style.cursor = (r.results&&r.results.length)?'pointer':'default';
            }).catch(function(){});
        });
    });
    </script>
</body>
</html>
