<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="utf-8">
    <title>Барилгын явц</title>
    <link rel="stylesheet" href="https://js.arcgis.com/4.31/esri/themes/dark/main.css">
    <script src="https://js.arcgis.com/4.31/"></script>
    <style>
        html, body, #viewDiv { height:100%; width:100%; margin:0; padding:0; }
        #msg { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); z-index:9;
               background:rgba(8,14,26,.95); color:#9fe; padding:14px 18px; border-radius:10px;
               border:1px solid rgba(120,160,200,.3); font:13px/1.5 system-ui,sans-serif; pointer-events:none; }
    </style>
</head>
<body>
    <div id="viewDiv"></div>
    <div id="msg">Түр хүлээнэ үү…</div>
    <script>
        // ── Pure ArcGIS SDK (WebMap-гүй) — webmap 76a2…-ийн давхаргуудыг service линкээр ──
        require([
            "esri/Map", "esri/Basemap", "esri/views/MapView",
            "esri/layers/FeatureLayer", "esri/layers/VectorTileLayer",
            "esri/widgets/Editor", "esri/widgets/Legend", "esri/widgets/BasemapGallery", "esri/widgets/Expand"
        ], function(Map, Basemap, MapView, FeatureLayer, VectorTileLayer, Editor, Legend, BasemapGallery, Expand){
            var ORIGIN = location.origin; // parent ↔ iframe ижил origin
            var NB_TITLE = "New_building";

            // building_GOL — гүйцэтгэлээр (GUITS_HV) өнгө
            function fill(c, oc){ return { type:"simple-fill", color:c, outline:{ color:oc, width:0.8 } }; }
            var BLD_RENDERER = {
                type: "class-breaks", field: "GUITS_HV",
                defaultSymbol: fill([150,160,175,0.55], [200,210,225,0.9]), defaultLabel: "Мэдээлэлгүй",
                classBreakInfos: [
                    { minValue:0,   maxValue:25,  symbol: fill([255,95,87,0.62],  [255,140,120,0.95]), label:"Эхэлж буй (0–25%)" },
                    { minValue:25,  maxValue:50,  symbol: fill([245,200,66,0.62], [255,225,120,0.95]), label:"Явцтай (25–50%)" },
                    { minValue:50,  maxValue:75,  symbol: fill([120,210,120,0.62],[170,235,150,0.95]), label:"Дуусах шатандаа (50–75%)" },
                    { minValue:75,  maxValue:1e6, symbol: fill([48,240,160,0.66], [120,255,190,0.98]), label:"Бэлэн болсон (75–100%)" }
                ]
            };

            // Давхаргууд — webmap-аас snapshot (services.arcgis.com, CORS *)
            var RD = "https://services.arcgis.com/HJzgwvlNIXssnQar/arcgis/rest/services/selbe_road_20260707/FeatureServer/";
            var HJ = "https://services.arcgis.com/HJzgwvlNIXssnQar/arcgis/rest/services/";
            var lyrKhil   = new FeatureLayer({ url:RD+"16", title:"Хил", legendEnabled:false, popupEnabled:false,
                renderer:{ type:"simple", symbol:{ type:"simple-line", color:[5,234,242,1], width:1.4 } } });
            var lyrRoad   = new FeatureLayer({ url:RD+"19", title:"Зам", popupEnabled:false });        // service default renderer
            var lyrMark   = new FeatureLayer({ url:RD+"18", title:"Замын тэмдэглэгээ", popupEnabled:false });
            var lyrBridge = new FeatureLayer({ url:RD+"17", title:"Гүүр", popupEnabled:false });
            var bldLayer  = new FeatureLayer({ url:HJ+"building_GOL_barigdaj_ehelsen/FeatureServer/2",
                title:"Барилгын явц", outFields:["*"], renderer:BLD_RENDERER, opacity:0.92, popupEnabled:false });
            var nbLayer   = new FeatureLayer({ url:HJ+"New_building/FeatureServer/3", title:NB_TITLE, outFields:["*"], popupEnabled:false,
                renderer:{ type:"simple", symbol:{ type:"simple-fill", color:[251,5,255,0.22], outline:{ color:[251,5,255,1], width:1 } } } });

            var nova = new Basemap({ baseLayers:[ new VectorTileLayer({ portalItem:{ id:"75f4dfdff19e445395653121a95a85db" } }) ], title:"Nova" });
            var map = new Map({ basemap:nova, layers:[lyrKhil, lyrRoad, lyrMark, lyrBridge, bldLayer, nbLayer] });
            var view = new MapView({ container:"viewDiv", map:map, popupEnabled:false, constraints:{ rotationEnabled:false } });
            var bldLV;

            view.when(function(){
                var m=document.getElementById('msg'); if(m) m.remove();
                view.whenLayerView(bldLayer).then(function(lv){ bldLV=lv; });
                // building_GOL нь standard EPSG 32648 — goTo(fullExtent) аюулгүй (custom-WKT биш)
                bldLayer.when(function(){ view.goTo({ target: bldLayer.fullExtent }).catch(function(){}); pushSummary(); }).catch(function(){});

                var legend = new Legend({ view:view });
                view.ui.add(new Expand({ view:view, content:legend, expanded:false, expandTooltip:"Тэмдэглэгээ" }), "top-right");
                view.ui.add(new Expand({ view:view, content:new BasemapGallery({ view:view }), expanded:false, expandTooltip:"Суурь зураг", expandIcon:"basemap" }), "top-right");

                // ── Барилга нэмж зурах (зөвхөн New_building давхаргад attribute бөглөж хадгална) ──
                [bldLayer, lyrKhil, lyrRoad, lyrMark, lyrBridge].forEach(function(l){ l.editingEnabled=false; }); // бусад давхарга засварлахгүй
                var editForm = { title:"Шинэ барилга", elements:[
                    { type:"field", fieldName:"torol",    label:"Төрөл" },
                    { type:"field", fieldName:"ail_too",  label:"Айлын тоо" },
                    { type:"field", fieldName:"davhar",   label:"Давхрын тоо" },
                    { type:"field", fieldName:"guits_on", label:"Гүйцэтгэлийн огноо" }
                ]};
                var editor = new Editor({ view:view, label:"Барилга нэмэх",
                    layerInfos:[{ layer:nbLayer, enabled:true, addEnabled:true, updateEnabled:true, deleteEnabled:true, formTemplate:editForm }] });
                view.ui.add(new Expand({ view:view, content:editor, expanded:false, expandTooltip:"➕ Барилга нэмэх", group:"tl" }), "top-left");
            }, function(err){ var m=document.getElementById('msg'); if(m){ m.textContent='Алдаа: '+((err&&err.message)||err); m.style.color='#f99'; } });

            // Нийт болон гүйцэтгэлийн задаргааг тооцоод parent руу илгээх (самбарын өгөгдөл)
            function pushSummary(){
                var q1 = bldLayer.createQuery(); q1.where='1=1';
                q1.outStatistics=[
                    { statisticType:"count", onStatisticField:"FID",      outStatisticFieldName:"blok" },
                    { statisticType:"sum",   onStatisticField:"AIL_TOO",  outStatisticFieldName:"ail" },
                    { statisticType:"avg",   onStatisticField:"DAVHAR",   outStatisticFieldName:"davhar" }
                ];
                // GUITS_HV дундаж — N/A (-1) мөрүүдийг хасч тооцно (эс бол дундаж хиймлээр буурна)
                var qG = bldLayer.createQuery(); qG.where="GUITS_HV>=0";
                qG.outStatistics=[{ statisticType:"avg", onStatisticField:"GUITS_HV", outStatisticFieldName:"guits" }];
                var q2 = bldLayer.createQuery(); q2.where='1=1';
                q2.groupByFieldsForStatistics=["BAR_COMP"];
                q2.outStatistics=[{ statisticType:"count", onStatisticField:"FID", outStatisticFieldName:"c" }];
                q2.orderByFields=["c DESC"];
                var buckets=[["0–25%",-1,25],["25–50%",25,50],["50–75%",50,75],["75–100%",75,1e6]];
                var bTasks = buckets.map(function(b){
                    var q=bldLayer.createQuery(); q.where="GUITS_HV>"+b[1]+" AND GUITS_HV<="+b[2];
                    return bldLayer.queryFeatureCount(q).then(function(n){ return { label:b[0], n:n }; }).catch(function(){ return { label:b[0], n:0 }; });
                });
                Promise.all([ bldLayer.queryFeatures(q1), bldLayer.queryFeatures(q2), Promise.all(bTasks), bldLayer.queryFeatures(qG) ]).then(function(res){
                    var s = ((res[0].features||[])[0]||{}).attributes || {};
                    var g = ((res[3].features||[])[0]||{}).attributes || {};
                    var comps = (res[1].features||[]).map(function(f){ var name=(f.attributes.BAR_COMP||'').trim() || 'Тодорхойгүй'; return { name:name, c:f.attributes.c||0 }; });
                    parent.postMessage({ type:'progSummary', summary:{ blok:s.blok||0, ail:s.ail||0, guits:g.guits||0, davhar:s.davhar||0 }, dist: res[2], comps: comps }, ORIGIN);
                }).catch(function(){});
            }

            // Hover → блокийн дэлгэрэнгүйг parent руу
            var busy=false, lastFID=null;
            view.on('pointer-move', function(event){
                if(busy || !bldLayer) return; busy=true;
                view.hitTest(event, { include:[bldLayer] }).then(function(r){
                    busy=false;
                    var hit=r.results.filter(function(x){ return x.graphic && x.graphic.layer===bldLayer; })[0];
                    if(hit){
                        view.container.style.cursor='pointer';
                        var a=hit.graphic.attributes||{}, fid=a.FID;
                        if(fid!==lastFID){ lastFID=fid; parent.postMessage({ type:'progSelect', attrs:a }, ORIGIN); }
                    } else { view.container.style.cursor='default'; }
                }).catch(function(){ busy=false; });
            });
        });
    </script>
</body>
</html>
