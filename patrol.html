<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="utf-8">
    <title>Патрол — Хүн хүч</title>
    <link rel="stylesheet" href="https://js.arcgis.com/4.31/esri/themes/dark/main.css">
    <script src="https://js.arcgis.com/4.31/"></script>
    <style>
        :root{ --ok:#2fe0a0; --crit:#ff5c6c; --warn:#f7c948; --line:rgba(120,160,205,.14);
               --ink:#e7eef7; --ink2:#93a4bb; --ink3:#586a82; --panel:rgba(9,14,22,.9);
               --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,monospace; }
        html,body,#viewDiv{ height:100%;width:100%;margin:0;padding:0 }
        #viewDiv{ position:absolute;inset:0 }
        #msg{ position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:9;
              background:rgba(8,14,26,.95);color:#9fe;padding:14px 18px;border-radius:10px;
              border:1px solid rgba(120,160,200,.3);font:13px/1.5 system-ui,sans-serif;pointer-events:none }
        /* ── Нэвтрэх хаалт ── */
        #gate{ position:absolute;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;
               background:radial-gradient(1200px 600px at 50% 30%,rgba(20,40,66,.6),rgba(6,10,18,.96));
               font-family:system-ui,sans-serif }
        #gate .card{ text-align:center;background:var(--panel);border:1px solid var(--line);border-radius:16px;
                     padding:32px 34px;max-width:360px;box-shadow:0 30px 80px -24px rgba(0,0,0,.8) }
        #gate h1{ font-size:1.05rem;color:var(--ink);margin:0 0 6px;letter-spacing:.02em }
        #gate p{ font-size:.82rem;color:var(--ink2);margin:0 0 20px;line-height:1.6 }
        #gate .lock{ font-size:2rem;margin-bottom:12px }
        #signin{ display:inline-flex;align-items:center;gap:9px;padding:11px 22px;border:none;border-radius:10px;
                 background:linear-gradient(180deg,#22d3ff,#0aa2cc);color:#04121a;font:700 .9rem system-ui;
                 cursor:pointer;box-shadow:0 10px 26px -8px rgba(34,211,255,.6) }
        #signin:hover{ filter:brightness(1.07) }
        #gate .err{ margin-top:16px;font-size:.72rem;color:var(--crit);display:none }
        #alert{ position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:12;display:none;
                align-items:center;gap:11px;padding:11px 18px;border-radius:11px;font:600 13px system-ui,sans-serif;
                background:linear-gradient(180deg,rgba(255,92,108,.22),rgba(255,92,108,.12));
                border:1px solid rgba(255,92,108,.55);color:#ffd9dd;backdrop-filter:blur(8px);
                box-shadow:0 12px 34px -10px rgba(255,60,80,.5);max-width:70% }
        #alert.show{ display:flex;animation:pop .3s ease }
        @keyframes pop{ from{opacity:0;transform:translateX(-50%) translateY(-8px)} }
        #alert .dot{ width:9px;height:9px;border-radius:50%;background:var(--crit);box-shadow:0 0 10px var(--crit);animation:bl 1s infinite }
        @keyframes bl{ 50%{opacity:.3} }
        #panel{ position:absolute;top:14px;left:14px;z-index:10;width:300px;max-height:calc(100% - 28px);
                display:none;flex-direction:column;background:var(--panel);border:1px solid var(--line);
                border-radius:13px;overflow:hidden;backdrop-filter:blur(12px);
                box-shadow:0 24px 60px -20px rgba(0,0,0,.7);font-family:system-ui,sans-serif;color:var(--ink) }
        #panel.show{ display:flex }
        #panel .hd{ padding:13px 15px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:9px;
                    background:linear-gradient(180deg,rgba(255,255,255,.03),transparent) }
        #panel .hd .t{ font-size:.72rem;font-weight:800;letter-spacing:.13em;text-transform:uppercase }
        #panel .hd .live{ width:7px;height:7px;border-radius:50%;background:var(--ok);box-shadow:0 0 8px var(--ok);animation:bl 1.6s infinite }
        #panel .sum{ margin-left:auto;font-family:var(--mono);font-size:.72rem;color:var(--ink2) }
        #err{ display:none;align-items:center;gap:7px;padding:8px 15px;font-size:.7rem;color:var(--warn);
              background:rgba(247,201,72,.08);border-bottom:1px solid rgba(247,201,72,.2) }
        #err.show{ display:flex }
        #panel .list{ overflow-y:auto;padding:6px }
        .wk{ display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:9px;transition:background .15s;cursor:pointer }
        .wk:hover{ background:rgba(255,255,255,.05) }
        .wk.sel{ background:rgba(34,211,255,.1);box-shadow:inset 2px 0 0 #22d3ff }
        .wk .st{ width:11px;height:11px;border-radius:50%;flex-shrink:0 }
        .wk.on .st{ background:var(--ok);box-shadow:0 0 8px var(--ok) }
        .wk.off .st{ background:var(--crit) }
        .wk .nm{ flex:1;min-width:0;font-size:.83rem;font-weight:650;white-space:nowrap;overflow:hidden;text-overflow:ellipsis }
        .wk .badge{ font-size:.56rem;font-weight:800;letter-spacing:.04em;text-transform:uppercase;padding:2px 8px;border-radius:20px;flex-shrink:0 }
        .badge.b-on{ background:rgba(47,224,160,.13);color:var(--ok) }
        .badge.b-off{ background:rgba(255,92,108,.13);color:var(--crit) }
        #detail{ display:none;padding:11px 15px;border-top:1px solid var(--line);background:rgba(255,255,255,.02) }
        #detail.show{ display:block }
        #detail .dn{ font-size:.86rem;font-weight:700;margin-bottom:6px }
        #detail .dr{ display:flex;justify-content:space-between;font-size:.72rem;color:var(--ink2);padding:2px 0 }
        #detail .dr b{ color:var(--ink);font-weight:600 }
        #panel .ft{ padding:9px 13px;border-top:1px solid var(--line);font-size:.63rem;color:var(--ink3);
                    display:flex;align-items:center;justify-content:space-between;gap:8px }
        #panel .ft label{ display:flex;align-items:center;gap:5px }
        #panel .ft input{ width:46px;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:5px;
                          color:var(--ink);font-family:var(--mono);font-size:.7rem;padding:2px 5px;text-align:center }
        #snd{ position:absolute;bottom:14px;right:14px;z-index:11;display:none;align-items:center;gap:6px;
              padding:7px 12px;border-radius:8px;background:var(--panel);border:1px solid var(--line);
              color:var(--ink2);font:600 11px system-ui;cursor:pointer;backdrop-filter:blur(8px) }
        #snd.ready{ display:flex }
        #snd.on{ color:var(--ok);border-color:rgba(47,224,160,.3) }
        #who{ position:absolute;bottom:14px;left:14px;z-index:11;display:none;align-items:center;gap:8px;
              padding:6px 8px 6px 12px;border-radius:8px;background:var(--panel);border:1px solid var(--line);
              color:var(--ink2);font:600 11px system-ui;backdrop-filter:blur(8px) }
        #who.show{ display:flex }
        #who button{ background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:6px;color:var(--ink2);
                     font:600 10px system-ui;padding:3px 8px;cursor:pointer }
    </style>
</head>
<body>
    <div id="viewDiv"></div>
    <div id="msg">Түр хүлээнэ үү…</div>

    <!-- Нэвтрэх хаалт -->
    <div id="gate">
        <div class="card">
            <div class="lock">🔒</div>
            <h1>Патрол — Хүн хүчний хяналт</h1>
            <p>Ажилчдын байршил нь хамгаалалттай мэдээлэл тул<br>ArcGIS дансаараа нэвтэрнэ үү.</p>
            <button id="signin">🔑 ArcGIS-ээр нэвтрэх</button>
            <div class="err" id="gateErr"></div>
        </div>
    </div>

    <div id="alert" role="alert" aria-live="assertive"><span class="dot"></span><span id="alertTxt"></span></div>
    <div id="panel">
        <div class="hd"><span class="live"></span><span class="t">Патрол · Хүн хүч</span><span class="sum" id="sum">—</span></div>
        <div id="err">⚠ Холбогдоогүй — дахин оролдож байна…</div>
        <div class="list" id="list" aria-live="polite"></div>
        <div id="detail"></div>
        <div class="ft">
            <label>Offline босго <input type="number" id="thrInput" min="1" max="30" step="1" value="3"> мин</label>
            <span id="refresh">—</span>
        </div>
    </div>
    <div id="snd" title="Дуут дохио + мэдэгдэл асаах/унтраах">🔔 <span id="sndTxt">Дуу асаах</span></div>
    <div id="who"><span id="whoTxt"></span><button id="signout">Гарах</button></div>

    <script>
        require([
            "esri/Map","esri/Basemap","esri/views/MapView",
            "esri/layers/FeatureLayer","esri/layers/GraphicsLayer","esri/layers/VectorTileLayer","esri/Graphic",
            "esri/identity/OAuthInfo","esri/identity/IdentityManager","esri/request"
        ], function(Map, Basemap, MapView, FeatureLayer, GraphicsLayer, VectorTileLayer, Graphic, OAuthInfo, esriId, esriRequest){

            // ── Тохиргоо ──
            var PORTAL   = "https://monmap.maps.arcgis.com";
            var APPID    = "ZPJRqk1iiYcjYRLv";
            var TRACK_FS = "https://locationservices.arcgis.com/HJzgwvlNIXssnQar/arcgis/rest/services/f2217e1fa00f443d922d399db8df92b0_Track_View/FeatureServer";
            var WORKERS_URL = "https://services.arcgis.com/HJzgwvlNIXssnQar/arcgis/rest/services/workforce_fbca57b6b61b494e887ebf0b5600e4be/FeatureServer/1";
            var WF_SVC   = "https://services.arcgis.com/HJzgwvlNIXssnQar/arcgis/rest/services/workforce_fbca57b6b61b494e887ebf0b5600e4be/FeatureServer";
            var REFRESH_SEC = 10;
            var STATUS = {0:"Ажиллахгүй",1:"Ажиллаж буй",2:"Завсарлагаа"};

            var offlineMin = 3;              // location_timestamp heartbeat ~60 сек тул 3 мин найдвартай
            var clockSkew = 0;
            var prevState = {}, gById = {}, selId = null;
            var poll = null, soundOn = false, audioCtx = null;
            var lklLayer = null, tsField = "location_timestamp", userField = "created_user", workerMap = {};

            document.getElementById('thrInput').value = offlineMin;

            // ── OAuth (redirect флоу; iframe-д ArcGIS нэвтрэх хуудас ачаалагддаггүй тул тусад нь зохицуулна) ──
            var info = new OAuthInfo({ appId:APPID, portalUrl:PORTAL, popup:false });
            esriId.registerOAuthInfos([info]);

            var inIframe = (window.self !== window.top);
            var CRED_KEY = "selbe_patrol_cred";
            var gate=document.getElementById('gate'), gateErr=document.getElementById('gateErr');

            // Токеныг localStorage-д хадгалж, табууд/iframe хооронд (ижил origin) хуваалцана
            function persistCreds(){ try{ localStorage.setItem(CRED_KEY, JSON.stringify(esriId.toJSON())); }catch(e){} }
            function restoreCreds(){ try{ var s=localStorage.getItem(CRED_KEY); if(s){ esriId.initialize(JSON.parse(s)); return true; } }catch(e){} return false; }
            // Redirect-ээс код боловсруулагдаж дуусмагц credential-create асдаг → нэвтрэлтийг найдвартай барина
            esriId.on("credential-create", function(ev){ persistCreds(); onSignedIn(ev && ev.credential); });

            document.getElementById('signin').addEventListener('click', function(){
                gateErr.style.display='none';
                if(inIframe){
                    // ArcGIS-ийн нэвтрэх хуудсыг iframe дотор ачаалж болдоггүй → тусдаа таб нээнэ
                    window.open(location.origin + location.pathname, "_blank");
                    gateErr.style.color = "#9fe";
                    gateErr.textContent = "↗ Шинэ табд нэвтэрнэ үү — нэвтэрмэгц энд автоматаар холбогдоно.";
                    gateErr.style.display='block';
                } else {
                    esriId.getCredential(PORTAL + "/sharing").then(onSignedIn).catch(function(e){
                        gateErr.style.color=""; gateErr.textContent = 'Нэвтрэлт амжилтгүй: '+((e&&e.message)||e);
                        gateErr.style.display='block';
                    });
                }
            });
            document.getElementById('signout').addEventListener('click', function(){
                try{ localStorage.removeItem(CRED_KEY); }catch(e){}
                esriId.destroyCredentials(); location.reload();
            });

            // Өөр таб нэвтэрвэл (localStorage өөрчлөгдөх) → энд автоматаар холбогдоно
            window.addEventListener("storage", function(e){
                if(e.key===CRED_KEY && e.newValue && gate.style.display!=="none"){
                    restoreCreds();
                    esriId.checkSignInStatus(PORTAL + "/sharing").then(onSignedIn).catch(function(){});
                }
            });

            // Ачаалахад: хадгалсан эрхийг сэргээгээд, нэвтэрсэн эсэхийг шалгах
            restoreCreds();
            esriId.checkSignInStatus(PORTAL + "/sharing").then(onSignedIn).catch(function(){ /* хаалт хэвээр */ });

            var started=false;
            function onSignedIn(cred){
                if(started) return; started=true;   // давхар эхлэхээс сэргийлнэ
                persistCreds();
                gate.style.display='none';
                document.getElementById('panel').classList.add('show');
                document.getElementById('snd').classList.add('ready');
                var u=(cred&&cred.userId)||'';
                if(u){ document.getElementById('whoTxt').textContent='👮 '+u; document.getElementById('who').classList.add('show'); }
                initApp();
            }

            // Токен дуусах/хүчингүй болбол → хаалт руу буцааж дахин нэвтрүүлнэ
            function handleAuthLost(){
                stopPoll(); started=false;
                try{ localStorage.removeItem(CRED_KEY); }catch(e){}
                try{ esriId.destroyCredentials(); }catch(e){}
                setErr(false);
                document.getElementById('panel').classList.remove('show');
                document.getElementById('who').classList.remove('show');
                gate.style.display='flex';
                gateErr.style.color=''; gateErr.textContent='Хандах эрх дууслаа — дахин нэвтэрнэ үү.'; gateErr.style.display='block';
            }

            // ── Дуу + Notification ──
            function beep(){ if(!soundOn) return;
                try{ audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
                    var o=audioCtx.createOscillator(), g=audioCtx.createGain();
                    o.type="sine"; o.frequency.value=880; o.connect(g); g.connect(audioCtx.destination);
                    g.gain.setValueAtTime(0.0001,audioCtx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.25,audioCtx.currentTime+0.02);
                    g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+0.4);
                    o.start(); o.stop(audioCtx.currentTime+0.42);
                }catch(e){}
            }
            function notify(txt){ if(soundOn && window.Notification && Notification.permission==="granted"){
                try{ new Notification("Патрол — Хүн хүч",{ body:txt }); }catch(e){} } }
            var snd=document.getElementById('snd');
            snd.addEventListener('click', function(){
                soundOn=!soundOn; snd.classList.toggle('on', soundOn);
                document.getElementById('sndTxt').textContent = soundOn?'Дуу асаалттай':'Дуу асаах';
                if(soundOn){ try{ audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)(); audioCtx.resume(); }catch(e){}
                    if(window.Notification && Notification.permission==="default") Notification.requestPermission(); beep(); }
            });

            function setErr(on){ document.getElementById('err').classList.toggle('show', on); }
            function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
            function pad(n){ return String(n).padStart(2,'0'); }
            function serverNow(){ return Date.now() + clockSkew; }
            function agoTxt(t){ if(!t) return 'байршил хуваалцаагүй'; var s=Math.max(0,Math.round((serverNow()-t)/1000));
                if(s<60) return s+' сек өмнө'; var m=Math.round(s/60); if(m<60) return m+' мин өмнө';
                var h=Math.round(m/60); if(h<48) return h+' цаг өмнө'; return Math.round(h/24)+' хоног өмнө'; }

            // ── Газрын зураг ──
            var gl = new GraphicsLayer();
            var nova = new Basemap({ baseLayers:[ new VectorTileLayer({ portalItem:{ id:"75f4dfdff19e445395653121a95a85db" } }) ], title:"Nova" });
            var map = new Map({ basemap:nova, layers:[gl] });
            var view = new MapView({ container:"viewDiv", map:map, center:[106.917,47.918], zoom:12, popupEnabled:false, constraints:{ rotationEnabled:false } });

            function initApp(){
                syncClock().then(loadWorkers).then(findLKL).then(function(){
                    var m=document.getElementById('msg'); if(m) m.remove();
                    refresh();
                    if(!document.hidden) startPoll();
                }).catch(function(e){
                    var m=document.getElementById('msg'); if(m){ m.textContent='Алдаа: '+((e&&e.message)||e); m.style.color='#f99'; }
                });
            }

            // Серверийн цаг (public workforce service Date толгойгоос)
            function syncClock(){ return fetch(WF_SVC+"?f=json",{cache:"no-store"}).then(function(res){
                var d=res.headers.get("date"); if(d){ var st=new Date(d).getTime(); if(!isNaN(st)) clockSkew = st - Date.now(); }
            }).catch(function(){}); }

            // Workers (public) → userid→{name,title,phone,status}
            function loadWorkers(){
                var wl=new FeatureLayer({ url:WORKERS_URL, outFields:["*"] });
                var q=wl.createQuery(); q.where="1=1"; q.outFields=["name","userid","title","contactnumber","status"]; q.returnGeometry=false;
                return wl.queryFeatures(q).then(function(r){
                    (r.features||[]).forEach(function(f){ var a=f.attributes, uid=(a.userid||'').toLowerCase();
                        if(uid) workerMap[uid]={ name:(a.name||'').trim(), title:a.title, phone:a.contactnumber, status:a.status }; });
                }).catch(function(){});
            }

            // Track View доторх "Last Known Locations" давхаргыг олж, field нэрсийг илрүүлэх
            function findLKL(){
                return esriRequest(TRACK_FS, { query:{ f:"json" }, responseType:"json" }).then(function(r){
                    var layers=(r.data&&r.data.layers)||[];
                    var pick = layers.filter(function(l){ return /known\s*location/i.test(l.name||''); })[0]
                             || layers.filter(function(l){ return !/track/i.test(l.name||''); })[0] || layers[0];
                    if(!pick) throw new Error('Last Known Locations давхарга олдсонгүй');
                    lklLayer = new FeatureLayer({ url: TRACK_FS + "/" + pick.id, outFields:["*"] });
                    return lklLayer.load();
                }).then(function(){
                    // field нэрсийг илрүүлэх (нэр өөр байсан ч ажиллана)
                    var fs=(lklLayer.fields||[]).map(function(f){ return f.name; });
                    tsField = fs.filter(function(n){ return /location_?timestamp/i.test(n); })[0]
                            || fs.filter(function(n){ return /timestamp/i.test(n); })[0] || "location_timestamp";
                    userField = fs.filter(function(n){ return /^created_user$/i.test(n); })[0]
                              || fs.filter(function(n){ return /full_?name/i.test(n); })[0]
                              || fs.filter(function(n){ return /user/i.test(n); })[0] || "created_user";
                });
            }

            // ── Ажилтан дээр дарах → zoom + дэлгэрэнгүй ──
            function selectWorker(rec){
                selId = rec.key;
                Array.prototype.forEach.call(document.querySelectorAll('.wk'), function(w){ w.classList.toggle('sel', w.dataset.key===selId); });
                var det=document.getElementById('detail'); det.classList.add('show');
                det.innerHTML='<div class="dn">'+esc(rec.name)+'</div>'
                    +'<div class="dr"><span>Албан тушаал</span><b>'+esc(rec.title||'—')+'</b></div>'
                    +'<div class="dr"><span>Утас</span><b>'+esc(rec.phone||'—')+'</b></div>'
                    +'<div class="dr"><span>Төлөв</span><b>'+(rec.online?'🟢 Online':'🔴 Offline')+'</b></div>'
                    +'<div class="dr"><span>Сүүлд идэвхжсэн</span><b>'+agoTxt(rec.ts)+'</b></div>';
                if(rec.geom) view.goTo({ target:rec.geom, zoom:16 }).catch(function(){});
            }

            function upsertMarker(key, geom, online, rec){
                if(!geom){ if(gById[key]){ gl.removeMany([gById[key].mk, gById[key].lb]); delete gById[key]; } return; }
                var col = online?[47,224,160]:[255,92,108];
                var mkSym={ type:"simple-marker", size:online?11:13, color:col.concat(online?0.9:0.95), outline:{ color:[255,255,255,0.85], width:1.4 } };
                if(gById[key]){ gById[key].mk.geometry=geom; gById[key].mk.symbol=mkSym; gById[key].lb.geometry=geom; }
                else{
                    var mk=new Graphic({ geometry:geom, symbol:mkSym });
                    var lb=new Graphic({ geometry:geom, symbol:{ type:"text", text:(rec.name||'').split(' ')[0], color:"#eaf1f8", haloColor:[6,12,20,0.9], haloSize:1.4, yoffset:-16, font:{ size:9, weight:"bold" } } });
                    gById[key]={ mk:mk, lb:lb }; gl.addMany([mk, lb]);
                }
            }

            function refresh(){
                if(!lklLayer) return;
                var q=lklLayer.createQuery(); q.where="1=1"; q.outFields=["*"]; q.returnGeometry=true;
                lklLayer.queryFeatures(q).then(function(r){
                    setErr(false);
                    var now=serverNow(), list=document.getElementById('list'); list.innerHTML='';
                    var onCnt=0, offCnt=0, newlyOffline=[], seen={}, recs=[];
                    (r.features||[]).forEach(function(f){
                        var a=f.attributes, uid=String(a[userField]||'').toLowerCase();
                        var ts=a[tsField]||0; if(ts && typeof ts!=='number'){ ts=new Date(ts).getTime()||0; }
                        var wm=workerMap[uid]||{};
                        var nm=(wm.name||a[userField]||'Нэргүй');
                        var online = ts>0 && (now-ts) <= offlineMin*60*1000;
                        recs.push({ key:String(a.OBJECTID), name:nm, title:wm.title, phone:wm.phone, ts:ts, online:online, geom:f.geometry });
                    });
                    recs.sort(function(a,b){ return (b.ts||0)-(a.ts||0); });
                    recs.forEach(function(rec){
                        if(rec.online) onCnt++; else offCnt++;
                        if(prevState[rec.key]===true && !rec.online) newlyOffline.push(rec.name);
                        prevState[rec.key]=rec.online;
                        var li=document.createElement('div'); li.className='wk '+(rec.online?'on':'off')+(selId===rec.key?' sel':'');
                        li.dataset.key=rec.key;
                        li.innerHTML='<span class="st"></span><span class="nm">'+esc(rec.name)+'</span>'
                            +'<span class="badge '+(rec.online?'b-on':'b-off')+'">'+(rec.online?'Online':'Offline')+'</span>';
                        li.addEventListener('click', function(){ selectWorker(rec); });
                        list.appendChild(li);
                        seen[rec.key]=true; upsertMarker(rec.key, rec.geom, rec.online, rec);
                    });
                    Object.keys(gById).forEach(function(k){ if(!seen[k]){ gl.removeMany([gById[k].mk, gById[k].lb]); delete gById[k]; } });
                    if(!recs.length){ list.innerHTML='<div style="padding:14px;font-size:.75rem;color:var(--ink3);line-height:1.6">Одоогоор хэн ч байршил хуваалцаагүй.<br>Ажилчид Field Maps дээр байршлаа асаах шаардлагатай.</div>'; }
                    document.getElementById('sum').textContent = onCnt+' online · '+offCnt+' offline';
                    var d=new Date();
                    document.getElementById('refresh').textContent = pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds());
                    if(newlyOffline.length){
                        var al=document.getElementById('alert'), t='⚠ '+newlyOffline.join(', ')+' offline боллоо';
                        document.getElementById('alertTxt').textContent=t; al.classList.add('show');
                        beep(); notify(t); clearTimeout(al._h); al._h=setTimeout(function(){ al.classList.remove('show'); }, 8000);
                    }
                }).catch(function(e){ console.error(e);
                    var m=((e&&(e.name||''))+' '+(e&&(e.message||''))).toLowerCase();
                    if(/token|not-authorized|identity|498|499|403/.test(m)) handleAuthLost(); else setErr(true);
                });
            }

            document.getElementById('thrInput').addEventListener('change', function(){
                var v=parseInt(this.value,10); if(!isNaN(v)){ offlineMin=Math.min(30,Math.max(1,v)); this.value=offlineMin; refresh(); }
            });

            function startPoll(){ if(!poll) poll=setInterval(refresh, REFRESH_SEC*1000); }
            function stopPoll(){ if(poll){ clearInterval(poll); poll=null; } }
            document.addEventListener('visibilitychange', function(){
                if(document.hidden) stopPoll(); else if(lklLayer){ refresh(); startPoll(); }
            });
        });
    </script>
</body>
</html>
