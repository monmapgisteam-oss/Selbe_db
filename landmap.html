<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Газар чөлөөлөлт</title>
    <link rel="stylesheet" href="https://js.arcgis.com/4.31/esri/themes/dark/main.css">
    <script src="https://js.arcgis.com/4.31/"></script>
    <style>
        html, body, #viewDiv { height:100%; width:100%; margin:0; padding:0; }
        #msg { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); z-index:9;
               background:rgba(8,14,26,.95); color:#9fe; padding:14px 18px; border-radius:10px;
               border:1px solid rgba(120,160,200,.3); font:13px/1.5 system-ui,sans-serif; pointer-events:none; }
    </style>
</head>
<body>
    <div id="viewDiv"></div>
    <div id="msg">Түр хүлээнэ үү…</div>
    <script>
        require([
            "esri/WebMap", "esri/views/MapView", "esri/layers/GraphicsLayer",
            "esri/widgets/Sketch/SketchViewModel", "esri/widgets/BasemapGallery", "esri/widgets/Expand"
        ], function(WebMap, MapView, GraphicsLayer, SketchVM, BasemapGallery, Expand){
            var drawLayer = new GraphicsLayer({ listMode:"hide" });
            var map = new WebMap({ portalItem: { id: "a41af2a9ea714286aeb669ee6f2fcc9d" } });
            var view = new MapView({ container: "viewDiv", map: map });
            view.popupEnabled = false;
            var bldLayer, parcelLayer, bldLV, parcelLV;

            view.when(function(){
                var m=document.getElementById('msg'); if(m) m.remove();
                map.allLayers.forEach(function(l){ if(l.type==='feature') l.outFields=['*']; });
                map.add(drawLayer);
                bldLayer = map.allLayers.find(function(l){ return l.title==='Building'; });
                parcelLayer = map.allLayers.find(function(l){ return l.title==='Parcel'; });
                if(bldLayer) view.whenLayerView(bldLayer).then(function(lv){ bldLV=lv; });
                if(parcelLayer) view.whenLayerView(parcelLayer).then(function(lv){ parcelLV=lv; });
                // Esri суурь зураг сонгогч
                var bgExp = new Expand({ view:view, expandTooltip:"Суурь зураг", expandIcon:"basemap",
                    content: new BasemapGallery({ view:view }) });
                view.ui.add(bgExp, "top-right");
            }, function(err){ var m=document.getElementById('msg'); if(m){ m.textContent='Алдаа: '+((err&&err.message)||err); m.style.color='#f99'; } });

            var EXCLUDE = "opacity(12%) grayscale(85%)";

            function applySelection(geom){
                if(bldLV) bldLV.featureEffect = { filter:{ geometry:geom, spatialRelationship:"intersects" }, excludedEffect:EXCLUDE };
                if(parcelLV) parcelLV.featureEffect = { filter:{ geometry:geom, spatialRelationship:"intersects" }, excludedEffect:EXCLUDE };
                var out = { type:'landSelect', parcels:{ counts:{}, total:0, area:0 }, buildings:{ n:0, area:0, avg:0 } };
                var tasks = [];
                if(parcelLayer){
                    var qp = parcelLayer.createQuery();
                    qp.geometry=geom; qp.spatialRelationship="intersects";
                    qp.groupByFieldsForStatistics=["rigth_type"];
                    qp.outStatistics=[
                        { statisticType:"count", onStatisticField:"OBJECTID", outStatisticFieldName:"c" },
                        { statisticType:"sum", onStatisticField:"area_m2", outStatisticFieldName:"a" }
                    ];
                    tasks.push(parcelLayer.queryFeatures(qp).then(function(r){
                        r.features.forEach(function(f){ var t=f.attributes.rigth_type, c=f.attributes.c||0; out.parcels.counts[t]=c; out.parcels.total+=c; out.parcels.area+=f.attributes.a||0; });
                    }).catch(function(){}));
                }
                if(bldLayer){
                    var SUMF=["NIIT_UNE","MKV_UNE","SARUUN_TUR","OROO_TOO","DAVHAR_TOO","AJLIIN_BAI","BAGTSAAMAI"];
                    var qb = bldLayer.createQuery();
                    qb.geometry=geom; qb.spatialRelationship="intersects";
                    qb.outStatistics=[
                        { statisticType:"count", onStatisticField:"FID", outStatisticFieldName:"n" },
                        { statisticType:"sum", onStatisticField:"area_m2", outStatisticFieldName:"a" },
                        { statisticType:"avg", onStatisticField:"area_m2", outStatisticFieldName:"av" }
                    ].concat(SUMF.map(function(f){ return { statisticType:"sum", onStatisticField:f, outStatisticFieldName:f }; }));
                    tasks.push(bldLayer.queryFeatures(qb).then(function(r){
                        var a=(r.features[0]||{}).attributes||{};
                        out.buildings.n=a.n||0; out.buildings.area=a.a||0; out.buildings.avg=a.av||0;
                        out.buildings.sums={}; SUMF.forEach(function(f){ out.buildings.sums[f]=a[f]; });
                    }).catch(function(){}));
                }
                Promise.all(tasks).then(function(){ parent.postMessage(out, '*'); });
            }

            function clearSel(){
                drawLayer.removeAll();
                if(bldLV) bldLV.featureEffect=null;
                if(parcelLV) parcelLV.featureEffect=null;
                parent.postMessage({ type:'landClear' }, '*');
            }

            var sketch = new SketchVM({ view:view, layer:drawLayer });
            sketch.on("create", function(e){
                if(e.state==="complete"){ var geom=e.graphic.geometry; drawLayer.removeAll(); applySelection(geom); }
            });

            // ── Parent-аас команд (баруун самбарын товч) ──
            window.addEventListener('message', function(e){
                var d=e.data||{};
                if(d.type==='landTool'){
                    if(d.action==='draw') sketch.create("polygon");
                    else if(d.action==='clear'){ sketch.cancel(); clearSel(); }
                }
                else if(d.type==='parcelFilter'){
                    if(parcelLV) parcelLV.featureEffect = d.value
                        ? { filter:{ where:"rigth_type='"+d.value+"'" }, excludedEffect:EXCLUDE }
                        : null;
                }
            });

            // Барилга дарахад дэлгэрэнгүй (зурж байх үед биш)
            view.on('click', function(event){
                if(sketch.state==='active') return;
                view.hitTest(event).then(function(r){
                    var hit = r.results.filter(function(x){ return x.graphic && x.graphic.layer && x.graphic.layer.title==='Building'; })[0];
                    if(hit){ parent.postMessage({ type:'bldSelect', attrs: hit.graphic.attributes }, '*'); }
                });
            });
        });
    </script>
</body>
</html>
